<!DOCTYPE html> <!-- O Doctype indica a linguagem de programação que está sendo usada. -->
<html lang="pt-br"> <!-- Inicio do codigo. -->
<head> <!-- Inicio do cabeçalho do documento. Dentro dessa tag pode ser inseridas folhas de estilo e scripts. -->
    <meta charset="UTF-8"> <!-- Indica qual será os caracteres(character set ou charset)será utilizado para renderizar o texto da página. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portifólio</title> <!-- Titulo do projeto. -->
</head> <!-- Fim do cabeçalho do documento. -->
<body> <!-- Nesse espaço está contido o conteúdo visual dá pagina. As tags que representam texto, botões e outros devem ser adicionados nesse intervalo. -->
    <!-- Um documento HTML é composto por tags que são escritas entre < >. As tags precisam ser abertas e fechadas, o que as diferenciam é que as tags de fechamento possuem uma \ antes do nome. Alguns códigos não precisam da <\> para fechamento, apenas da barra, como o caso da tag meta. Outro aspecto importante da linguagem é que ela é case insensitive, ou seja, não leva em consideração a diferença entre letras oficiais e minúsculas. -->
     <!-- No HTML há seis níveis de cabeçalhos/títulos que podem ser usados por meios das tags h1, h2, h3, h5, h6, sendo o h1 o maior e mais relevante e o h6 o menor/menos relevante. -->
      <h1> Portifólio</h1>
      <h2> Programação</h2>
      <h3> HTML</h3>
      <h4> CSS</h4>
      <h5> JS</h5>
      <h6> Matemática</h6>
      <!-- Parágrafos de texto são gerados em HTML por meio das tags <p> <\P>. Esse é um exemplo de tag cuja disposição na tela se dá em forma de -->
</body> <!-- Fechamento da tag. -->
</html> <!-- Fim do codigo. -->
